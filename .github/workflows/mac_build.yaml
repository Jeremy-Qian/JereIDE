name: Build macOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Recommended stable version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller
        run: |
          # Use --windowed to create a .app bundle instead of just a binary
          # Use --onefile to package everything into a single component
          pyinstaller --onefile --windowed -i BetaAppIcon.icns --target-arch universal2 src/jereide/__main__.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/*.app # Or dist/your_script if not using --windowed
