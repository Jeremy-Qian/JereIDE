name: Build macOS Intel App
on:
  push:
    paths:
      - "src/**"               # All source files
      - "icons/**"             # Icon assets
      - "requirements.txt"     # Python‑pip deps (or your equivalent)
      - "pyproject.toml"       # Poetry/PEP‑517 build config
      - "setup.cfg"           # If you use setuptools
      - "package.json"        # Node / npm deps (if applicable)
      - "yarn.lock"
  workflow_dispatch:


jobs:
  build:
    runs-on: macos-15-intel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Recommended stable version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test Run App
        run: |
          python3 -c "import subprocess; subprocess.run(['python3 src/JereIDE.py'], timeout=10)"
      - name: Build with PyInstaller
        run: |
          # Use --windowed to create a .app bundle instead of just a binary
          # Use --onefile to package everything into a single component
          pyinstaller --onedir --windowed -i src/components/icons/BetaAppIcon.icns --target-arch x86_64 --add-data "src/components/icons:src/components/icons" src/JereIDE.py
      - name: Remove Quarantine Flag
        run: |
          xattr -cr dist/*.app


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/*.app # Or dist/your_script if not using --windowed

      - name: Test App
        run: |
          open dist/*.app
